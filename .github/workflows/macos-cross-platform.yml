name: cross-platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - '18'
          - '24'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show environment
        run: |
          node --version
          bash --version
          git --version
          echo "OS: ${{ matrix.os }}"

      - name: Check POSIX installer syntax
        if: matrix.os != 'windows-latest'
        run: |
          bash -n install.sh
          bash -n install-codex.sh

      - name: Run core smoke checks
        run: |
          node scripts/agent-orchestrator.js self-test
          node scripts/validate-codex-plugin.js
          node scripts/validate-codex-install.js --project
          node scripts/validate-claude-install.js --project
          node scripts/smoke-memory-parity.js
          node scripts/smoke-relevance.js
          node scripts/smoke-pre-commit.js
          node scripts/smoke-cross-platform.js

      - name: Run unit tests
        run: |
          node scripts/run-tests.js

      - name: Probe Claude project install
        if: matrix.os != 'windows-latest'
        run: |
          probe_dir="$(mktemp -d)"
          home_dir="$(mktemp -d)"
          git init -q "$probe_dir"
          cd "$probe_dir"
          git config user.email "ci-smoke@example.invalid"
          git config user.name "CI Smoke"
          HOME="$home_dir" bash "$GITHUB_WORKSPACE/install.sh" --project
          test -f ".claude/settings.json"
          test -d ".claude/plans"
          test -f "CLAUDE.md"

      - name: Probe Codex project install
        if: matrix.os != 'windows-latest'
        run: |
          probe_dir="$(mktemp -d)"
          home_dir="$(mktemp -d)"
          git init -q "$probe_dir"
          cd "$probe_dir"
          git config user.email "ci-smoke@example.invalid"
          git config user.name "CI Smoke"
          HOME="$home_dir" bash "$GITHUB_WORKSPACE/install-codex.sh" --project
          test -f ".codex/commands/agent-loop.md"
          test -f ".codex/skills/agent-loop/SKILL.md"
